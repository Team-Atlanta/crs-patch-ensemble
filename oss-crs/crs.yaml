name: crs-patch-ensemble
type:
  - bug-fixing
  - bug-fixing-ensemble
version: 1.0.0
docker_registry: ghcr.io/team-atlanta/crs-patch-ensemble

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src
  - name: inc-builder-asan
    snapshot: true
    dockerfile: oss-crs-infra:default-builder
    additional_env:
      SANITIZER: address

crs_run_phase:
  patcher:
    dockerfile: oss-crs/patcher.Dockerfile
    additional_env:
      SANITIZER: address
  inc-builder-asan:
    run_snapshot: true
    dockerfile: oss-crs-infra:default-builder

supported_target:
  mode: [full, delta]
  language: [c, c++, jvm]
  sanitizer: [address, undefined]
  architecture: [x86_64]

required_llms:
  - claude-opus-4-6
  - claude-sonnet-4-6
  - claude-haiku-4-5-20251001
